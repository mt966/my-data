name: Global Industry Lead Generation

on:
  schedule:
    - cron: '0 */6 * * *' # Runs every 6 hours
  workflow_dispatch: # Allows manual trigger

jobs:
  generate-leads:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Global Search Sniper
        run: node search-sniper.mjs
        continue-on-error: true
        env:
          NODE_ENV: production

      - name: Run High-Speed Lead Scraper
        run: node international-leads-scraper.mjs
        continue-on-error: true
        env:
          NODE_ENV: production

      - name: Sync to Google Sheets
        run: node sheets-sync.mjs
        continue-on-error: true
        env:
          GOOGLE_SHEETS_WEBHOOK: ${{ secrets.GOOGLE_SHEETS_WEBHOOK }}

      - name: Upload Lead Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lead-generation-results
          path: |
            international_industry_leads.csv
            potential_leads.json
            synced_leads.json

      - name: Commit and Push Changes
        run: |
          git config --global user.name "LeadGenBot"
          git config --global user.email "bot@github.com"
          # Only add files that actually exist
          [ -f international_industry_leads.csv ] && git add -f international_industry_leads.csv || echo "CSV skip"
          [ -f potential_leads.json ] && git add -f potential_leads.json || echo "JSON skip"
          [ -f synced_leads.json ] && git add -f synced_leads.json || echo "Sync logs skip"
          git commit -m "Auto-Update: New industry leads found [skip ci]" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
